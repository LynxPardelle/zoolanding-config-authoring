name: CI

on:
  push:
    branches: [dev, test, main, 'codex/**']
  pull_request:
    branches: [dev, test, main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Enforce promotion graph
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$BASE_REF" == "test" && "$HEAD_REF" != "dev" ]]; then
              echo "Pull requests into test must come from dev."
              exit 1
            fi
            if [[ "$BASE_REF" == "main" && "$HEAD_REF" != "test" ]]; then
              echo "Pull requests into main must come from test."
              exit 1
            fi
          fi

  test:
    runs-on: ubuntu-latest
    needs: guard
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      SAM_CLI_TELEMETRY: 0
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Run unit tests
        env:
          LOG_LEVEL: ERROR
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Optional dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found; skipping dependency audit."
          fi
      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
      - name: Stage allowlisted Lambda artifact
        run: python tools/build_lambda_artifact.py
      - name: Validate SAM template
        run: sam validate
      - name: Build and verify SAM artifact
        run: |
          sam build --no-cached
          python tools/build_lambda_artifact.py --verify-artifact .aws-sam/build/ConfigAuthoringFunction
