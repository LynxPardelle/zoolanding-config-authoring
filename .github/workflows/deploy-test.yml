name: Deploy Test

on:
  push:
    branches: [test]

permissions:
  id-token: write
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Require dev merge
        run: |
          set -euo pipefail
          git fetch origin dev test
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          test "$parent_count" -ge 2
          second_parent="$(git rev-list --parents -n 1 HEAD | awk '{print $3}')"
          git merge-base --is-ancestor "$second_parent" origin/dev
  deploy:
    runs-on: ubuntu-latest
    needs: guard
    environment: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: aws-actions/setup-sam@v3
      - name: Test and build deploy artifact
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p "test_*.py"
          python tools/build_lambda_artifact.py
          sam validate
          sam build --no-cached
          python tools/build_lambda_artifact.py --verify-artifact .aws-sam/build/ConfigAuthoringFunction
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Deploy
        run: |
          set -euo pipefail
          sam deploy --config-env test --no-confirm-changeset --no-fail-on-empty-changeset
