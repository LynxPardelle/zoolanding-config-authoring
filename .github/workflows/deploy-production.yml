name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: zoolanding-config-authoring-production
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      test_run_id: ${{ steps.exact_test_run.outputs.test_run_id }}
      test_run_attempt: ${{ steps.exact_test_run.outputs.test_run_attempt }}
      test_source_sha: ${{ steps.exact_test_run.outputs.test_source_sha }}
      test_artifact_id: ${{ steps.exact_test_artifact.outputs.test_artifact_id }}
      test_artifact_name: ${{ steps.exact_test_artifact.outputs.test_artifact_name }}
    permissions:
      contents: read
      actions: read
    env:
      BEFORE_SHA: ${{ github.event.before }}
      SOURCE_BRANCH: "test"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Require test merge
        id: exact_test_run
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}"
          commit="$(git rev-parse HEAD)"
          second_parent="$(git rev-parse "refs/remotes/origin/${SOURCE_BRANCH}")"
          commit_tree="$(git rev-parse "${commit}^{tree}")"
          source_tree="$(git rev-parse "${second_parent}^{tree}")"
          parents_line="$(git rev-list --parents -n 1 HEAD)"
          python tools/verify_promotion_provenance.py \
            --commit "$commit" \
            --before-sha "$BEFORE_SHA" \
            --source-tip "$second_parent" \
            --commit-tree "$commit_tree" \
            --source-tree "$source_tree" \
            --parents-line "$parents_line"
          runs="$RUNNER_TEMP/exact-test-deploy-runs.json"
          workflow="$RUNNER_TEMP/exact-test-workflow.json"
          gh api \
            --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-test.yml" > "$workflow"
          gh api \
            --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-test.yml/runs" \
            -f branch=test \
            -f head_sha="$second_parent" \
            -f status=success \
            -f per_page=100 > "$runs"
          python - "$runs" "$workflow" "$second_parent" "$GITHUB_REPOSITORY" "$GITHUB_OUTPUT" <<'PY'
          import json
          from pathlib import Path
          import re
          import sys

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          workflow = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          expected_sha = sys.argv[3]
          expected_repository = sys.argv[4]
          output_path = Path(sys.argv[5])
          workflow_id = workflow.get("id") if isinstance(workflow, dict) else None
          if (
              not isinstance(workflow_id, int)
              or workflow_id < 1
              or workflow.get("name") != "Deploy Test"
              or workflow.get("path") != ".github/workflows/deploy-test.yml"
              or workflow.get("state") != "active"
          ):
              raise SystemExit("exact Deploy Test workflow metadata is unavailable")
          workflow_runs = payload.get("workflow_runs") if isinstance(payload, dict) else None
          if not isinstance(workflow_runs, list):
              raise SystemExit("test workflow run evidence is unavailable")
          matches = [
              run for run in workflow_runs
              if isinstance(run, dict)
              and run.get("head_sha") == expected_sha
              and run.get("head_branch") == "test"
              and run.get("event") == "push"
              and run.get("status") == "completed"
              and run.get("conclusion") == "success"
              and run.get("name") == "Deploy Test"
              and run.get("path") == ".github/workflows/deploy-test.yml"
              and run.get("workflow_id") == workflow_id
              and isinstance(run.get("run_attempt"), int)
              and run.get("run_attempt") >= 1
              and isinstance(run.get("repository"), dict)
              and run["repository"].get("full_name") == expected_repository
              and isinstance(run.get("id"), int)
              and run.get("id") >= 1
          ]
          if len(matches) != 1 or not re.fullmatch(r"[a-f0-9]{40}", expected_sha):
              raise SystemExit("exact promoted test commit has no unique successful Deploy Test run")
          output_path.write_text(
              f"test_run_id={matches[0]['id']}\n"
              f"test_run_attempt={matches[0]['run_attempt']}\n"
              f"test_source_sha={expected_sha}\n",
              encoding="utf-8",
          )
          PY
      - name: Resolve exact immutable test artifact
        id: exact_test_artifact
        shell: bash
        env:
          TEST_RUN_ID: ${{ steps.exact_test_run.outputs.test_run_id }}
          TEST_RUN_ATTEMPT: ${{ steps.exact_test_run.outputs.test_run_attempt }}
          TEST_SOURCE_SHA: ${{ steps.exact_test_run.outputs.test_source_sha }}
        run: |
          set -euo pipefail
          [[ "$TEST_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$TEST_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$TEST_SOURCE_SHA" =~ ^[a-f0-9]{40}$ ]]
          artifacts="$RUNNER_TEMP/exact-test-artifacts.json"
          gh api \
            --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${TEST_RUN_ID}/artifacts" \
            -f per_page=100 > "$artifacts"
          python - "$artifacts" "$TEST_RUN_ID" "$TEST_RUN_ATTEMPT" "$TEST_SOURCE_SHA" "$GITHUB_OUTPUT" <<'PY'
          # inline-test-artifact-resolver:start
          import json
          from pathlib import Path
          import re
          import sys

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          expected_run_id = int(sys.argv[2])
          expected_run_attempt = int(sys.argv[3])
          expected_sha = sys.argv[4]
          output_path = Path(sys.argv[5])
          name_pattern = re.compile(
              rf"config-authoring-test-{expected_run_id}-([1-9][0-9]*)-{re.escape(expected_sha)}"
          )
          artifacts = payload.get("artifacts") if isinstance(payload, dict) else None
          if not isinstance(artifacts, list):
              raise SystemExit("test artifact evidence is unavailable")
          matches = []
          for artifact in artifacts:
              run = artifact.get("workflow_run") if isinstance(artifact, dict) else None
              name = artifact.get("name") if isinstance(artifact, dict) else None
              name_match = name_pattern.fullmatch(name) if isinstance(name, str) else None
              artifact_attempt = int(name_match.group(1)) if name_match else None
              if (
                  isinstance(artifact, dict)
                  and artifact_attempt is not None
                  and artifact_attempt <= expected_run_attempt
                  and isinstance(artifact.get("id"), int)
                  and artifact["id"] >= 1
                  and isinstance(artifact.get("size_in_bytes"), int)
                  and artifact["size_in_bytes"] >= 1
                  and artifact.get("expired") is False
                  and isinstance(run, dict)
                  and run.get("id") == expected_run_id
                  and run.get("head_branch") == "test"
                  and run.get("head_sha") == expected_sha
              ):
                  matches.append((artifact_attempt, artifact))
          if not matches:
              raise SystemExit("exact successful test artifact is unavailable or ambiguous")
          latest_attempt = max(attempt for attempt, _ in matches)
          latest = [artifact for attempt, artifact in matches if attempt == latest_attempt]
          if len(latest) != 1:
              raise SystemExit("exact successful test artifact is unavailable or ambiguous")
          selected = latest[0]
          output_path.write_text(
              f"test_artifact_id={selected['id']}\n"
              f"test_artifact_name={selected['name']}\n",
              encoding="utf-8",
          )
          # inline-test-artifact-resolver:end
          PY

  validate:
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_name: ${{ steps.artifact_metadata.outputs.name }}
      manifest_digest: ${{ steps.manifest.outputs.digest }}
      test_source_sha: ${{ needs.guard.outputs.test_source_sha }}
    permissions:
      contents: read
      actions: read
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      SAM_CLI_TELEMETRY: 0
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
      - uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.163.0
          use-installer: true
          token: ${{ github.token }}
      - name: Validate promoted test artifact metadata
        shell: bash
        env:
          TEST_RUN_ID: ${{ needs.guard.outputs.test_run_id }}
          TEST_ARTIFACT_ID: ${{ needs.guard.outputs.test_artifact_id }}
          TEST_ARTIFACT_NAME: ${{ needs.guard.outputs.test_artifact_name }}
          TEST_SOURCE_SHA: ${{ needs.guard.outputs.test_source_sha }}
        run: |
          set -euo pipefail
          [[ "$TEST_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$TEST_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$TEST_SOURCE_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$TEST_ARTIFACT_NAME" =~ ^config-authoring-test-${TEST_RUN_ID}-[1-9][0-9]*-${TEST_SOURCE_SHA}$ ]]
      - name: Download exact successful test-run artifact by ID
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          artifact-ids: ${{ needs.guard.outputs.test_artifact_id }}
          path: .aws-sam/promoted-test-artifact
          github-token: ${{ github.token }}
          run-id: ${{ needs.guard.outputs.test_run_id }}
      - name: Reverify exact test merge without credentials
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          SOURCE_BRANCH: test
        run: |
          set -euo pipefail
          git fetch --no-tags origin "refs/heads/${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}"
          commit="$(git rev-parse HEAD)"
          source_tip="$(git rev-parse "refs/remotes/origin/${SOURCE_BRANCH}")"
          commit_tree="$(git rev-parse "${commit}^{tree}")"
          source_tree="$(git rev-parse "${source_tip}^{tree}")"
          parents_line="$(git rev-list --parents -n 1 HEAD)"
          python tools/verify_promotion_provenance.py \
            --commit "$commit" \
            --before-sha "$BEFORE_SHA" \
            --source-tip "$source_tip" \
            --commit-tree "$commit_tree" \
            --source-tree "$source_tree" \
            --parents-line "$parents_line"
      - name: Verify and normalize exact promoted test artifact
        shell: bash
        run: |
          set -euo pipefail
          promoted=.aws-sam/promoted-test-artifact
          if [[ -n "$(find "$promoted" -type l -print -quit)" ]]; then
            echo "artifact_link_invalid"
            exit 1
          fi
          test -f "$promoted/build-manifest.sha256"
          (cd "$promoted/build" && sha256sum --check --strict ../build-manifest.sha256)
          printf '%s\n' \
            './ConfigAuthoringFunction/lambda_function.py' \
            './ConfigAuthoringFunction/schemas/server-features/commerce.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/data-spaces.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/integration-bindings.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/notification-policies.schema.json' \
            './ConfigAuthoringFunction/server_policy_validation.py' \
            './ConfigAuthoringFunction/zoolanding_lambda_common.py' \
            './config-authoring-manifest.json' \
            './template.yaml' > "$RUNNER_TEMP/expected-promoted-build-files.txt"
          cut -c67- "$promoted/build-manifest.sha256" | LC_ALL=C sort \
            > "$RUNNER_TEMP/promoted-manifest-paths.txt"
          (cd "$promoted/build" && LC_ALL=C find . \( -type f -o -type l \) -print | LC_ALL=C sort) \
            > "$RUNNER_TEMP/promoted-build-paths.txt"
          diff -u "$RUNNER_TEMP/expected-promoted-build-files.txt" "$RUNNER_TEMP/promoted-manifest-paths.txt"
          diff -u "$RUNNER_TEMP/expected-promoted-build-files.txt" "$RUNNER_TEMP/promoted-build-paths.txt"
          printf '%s\n' \
            './build-manifest.sha256' \
            './build/ConfigAuthoringFunction/lambda_function.py' \
            './build/ConfigAuthoringFunction/schemas/server-features/commerce.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/data-spaces.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/integration-bindings.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/notification-policies.schema.json' \
            './build/ConfigAuthoringFunction/server_policy_validation.py' \
            './build/ConfigAuthoringFunction/zoolanding_lambda_common.py' \
            './build/config-authoring-manifest.json' \
            './build/template.yaml' > "$RUNNER_TEMP/expected-promoted-artifact-files.txt"
          (cd "$promoted" && LC_ALL=C find . \( -type f -o -type l \) -print | LC_ALL=C sort) \
            > "$RUNNER_TEMP/promoted-artifact-paths.txt"
          diff -u "$RUNNER_TEMP/expected-promoted-artifact-files.txt" "$RUNNER_TEMP/promoted-artifact-paths.txt"
          python tools/build_lambda_artifact.py \
            --normalize-artifact "$promoted/build/ConfigAuthoringFunction"
          python tools/build_lambda_artifact.py \
            --verify-sam-build "$promoted/build" \
            --expected-source-commit "${{ needs.guard.outputs.test_source_sha }}"
      - name: Test and build exact artifact without AWS credentials
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p "test_*.py"
          python tools/build_lambda_artifact.py
          sam validate --lint
          sam build --no-cached
          python tools/build_lambda_artifact.py --verify-artifact .aws-sam/build/ConfigAuthoringFunction
          python tools/build_lambda_artifact.py --normalize-artifact .aws-sam/build/ConfigAuthoringFunction
          python tools/build_lambda_artifact.py \
            --write-sam-manifest .aws-sam/build \
            --source-commit "$GITHUB_SHA"
          python tools/build_lambda_artifact.py \
            --verify-sam-build .aws-sam/build \
            --expected-source-commit "$GITHUB_SHA"
          cmp -s .aws-sam/build/template.yaml .aws-sam/promoted-test-artifact/build/template.yaml
      - name: Bind promoted manifest digest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          digest="$(sha256sum .aws-sam/promoted-test-artifact/build-manifest.sha256 | cut -d ' ' -f 1)"
          if [[ ! "$digest" =~ ^[a-f0-9]{64}$ ]]; then
            echo "manifest_digest_invalid"
            exit 1
          fi
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
      - name: Define artifact identity
        id: artifact_metadata
        shell: bash
        env:
          ARTIFACT_NAME: config-authoring-production-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: |
          set -euo pipefail
          printf 'name=%s\n' "$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
      - name: Upload exact validated artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact_metadata.outputs.name }}
          path: |
            .aws-sam/promoted-test-artifact/build/
            .aws-sam/promoted-test-artifact/build-manifest.sha256
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [guard, validate]
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      SAM_CLI_TELEMETRY: 0
    steps:
      - name: Validate artifact handoff metadata
        shell: bash
        env:
          EXPECTED_ARTIFACT_ID: ${{ needs.validate.outputs.artifact_id }}
          EXPECTED_ARTIFACT_NAME: ${{ needs.validate.outputs.artifact_name }}
          EXPECTED_MANIFEST_DIGEST: ${{ needs.validate.outputs.manifest_digest }}
          EXPECTED_SOURCE_SHA: ${{ needs.validate.outputs.test_source_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "artifact_id_invalid"
            exit 1
          fi
          artifact_name_pattern="^config-authoring-production-${GITHUB_RUN_ID}-[1-9][0-9]*-${GITHUB_SHA}$"
          if [[ ! "$EXPECTED_ARTIFACT_NAME" =~ $artifact_name_pattern ]]; then
            echo "artifact_name_invalid"
            exit 1
          fi
          if [[ ! "$EXPECTED_MANIFEST_DIGEST" =~ ^[a-f0-9]{64}$ ]]; then
            echo "manifest_digest_invalid"
            exit 1
          fi
          if [[ ! "$EXPECTED_SOURCE_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "source_sha_invalid"
            exit 1
          fi
      - name: Download validated artifact by immutable ID
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          artifact-ids: ${{ needs.validate.outputs.artifact_id }}
          path: .aws-sam
      - name: Verify and normalize exact validated artifact
        shell: bash
        env:
          EXPECTED_MANIFEST_DIGEST: ${{ needs.validate.outputs.manifest_digest }}
        run: |
          set -euo pipefail
          if [[ -n "$(find .aws-sam -type l -print -quit)" ]]; then
            echo "artifact_link_invalid"
            exit 1
          fi
          test -f .aws-sam/build-manifest.sha256
          printf '%s  %s\n' "$EXPECTED_MANIFEST_DIGEST" '.aws-sam/build-manifest.sha256' \
            | sha256sum --check --strict -
          (cd .aws-sam/build && sha256sum --check --strict ../build-manifest.sha256)
          printf '%s\n' \
            './ConfigAuthoringFunction/lambda_function.py' \
            './ConfigAuthoringFunction/schemas/server-features/commerce.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/data-spaces.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/integration-bindings.schema.json' \
            './ConfigAuthoringFunction/schemas/server-features/notification-policies.schema.json' \
            './ConfigAuthoringFunction/server_policy_validation.py' \
            './ConfigAuthoringFunction/zoolanding_lambda_common.py' \
            './config-authoring-manifest.json' \
            './template.yaml' > "$RUNNER_TEMP/expected-build-files.txt"
          cut -c67- .aws-sam/build-manifest.sha256 | LC_ALL=C sort > "$RUNNER_TEMP/manifest-paths.txt"
          (cd .aws-sam/build && LC_ALL=C find . \( -type f -o -type l \) -print | LC_ALL=C sort) \
            > "$RUNNER_TEMP/artifact-paths.txt"
          diff -u "$RUNNER_TEMP/expected-build-files.txt" "$RUNNER_TEMP/manifest-paths.txt"
          diff -u "$RUNNER_TEMP/expected-build-files.txt" "$RUNNER_TEMP/artifact-paths.txt"
          printf '%s\n' \
            './build-manifest.sha256' \
            './build/ConfigAuthoringFunction/lambda_function.py' \
            './build/ConfigAuthoringFunction/schemas/server-features/commerce.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/data-spaces.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/integration-bindings.schema.json' \
            './build/ConfigAuthoringFunction/schemas/server-features/notification-policies.schema.json' \
            './build/ConfigAuthoringFunction/server_policy_validation.py' \
            './build/ConfigAuthoringFunction/zoolanding_lambda_common.py' \
            './build/config-authoring-manifest.json' \
            './build/template.yaml' > "$RUNNER_TEMP/expected-artifact-files.txt"
          (cd .aws-sam && LC_ALL=C find . \( -type f -o -type l \) -print | LC_ALL=C sort) \
            > "$RUNNER_TEMP/all-artifact-paths.txt"
          diff -u "$RUNNER_TEMP/expected-artifact-files.txt" "$RUNNER_TEMP/all-artifact-paths.txt"
          find .aws-sam/build/ConfigAuthoringFunction -type f -exec touch -t 198001010000.00 {} +
          find .aws-sam/build/ConfigAuthoringFunction -depth -type d -exec touch -t 198001010000.00 {} +
      - uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.163.0
          use-installer: true
          token: ${{ github.token }}
      - name: Validate transported SAM template
        run: sam validate --lint --template-file .aws-sam/build/template.yaml
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          EXPECTED_SHA: ${{ github.sha }}
          SOURCE_BRANCH: test
          TARGET_BRANCH: main
        with:
          github-token: ${{ github.token }}
          script: |
            const fail = code => { throw new Error(code); };
            const isSha = value => /^[a-f0-9]{40}$/.test(value ?? '');
            const repository = process.env.GITHUB_REPOSITORY;
            const sha = process.env.EXPECTED_SHA;
            const sourceBranch = process.env.SOURCE_BRANCH;
            const targetBranch = process.env.TARGET_BRANCH;
            const event = context.payload;
            if (!repository || !isSha(sha) || context.eventName !== 'push'
              || process.env.GITHUB_REF !== `refs/heads/${targetBranch}`
              || event.forced === true || event.created === true || event.deleted === true
              || event.after !== sha || !isSha(event.before) || /^0+$/.test(event.before)) {
              fail('promotion_context_invalid');
            }
            const [owner, repo] = repository.split('/');
            if (!owner || !repo) fail('promotion_repository_invalid');
            const { data: commit } = await github.rest.git.getCommit({ owner, repo, commit_sha: sha });
            const parents = Array.isArray(commit.parents) ? commit.parents.map(parent => parent.sha) : [];
            if (parents.length !== 2 || parents.some(parent => !isSha(parent))) {
              fail('promotion_merge_commit_required');
            }
            if (parents[0] !== event.before) fail('promotion_first_parent_mismatch');
            const { data: source } = await github.rest.repos.getBranch({ owner, repo, branch: sourceBranch });
            if (!isSha(source.commit?.sha) || parents[1] !== source.commit.sha) {
              fail('promotion_source_tip_mismatch');
            }
            const { data: sourceCommit } = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: source.commit.sha,
            });
            if (!isSha(commit.tree?.sha) || commit.tree.sha !== sourceCommit.tree?.sha) {
              fail('promotion_tree_mismatch');
            }
            const { data: target } = await github.rest.repos.getBranch({ owner, repo, branch: targetBranch });
            if (target.commit?.sha !== sha) fail('promotion_target_tip_mismatch');
            core.info('promotion_provenance_verified');
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Bind current live test Lambda bytes to the exact promoted artifact
        run: |
          set -euo pipefail
          test_function_arn="$(aws cloudformation describe-stacks \
            --stack-name zoolanding-config-authoring-test \
            --query 'Stacks[0].Outputs[?OutputKey==`FunctionArn`].OutputValue | [0]' \
            --output text \
            --no-cli-pager)"
          [[ "$test_function_arn" == arn:aws:lambda:*:*:function:zoolanding-config-* ]]
          deployed_zip="$RUNNER_TEMP/live-test-lambda.zip"
          bound_code_sha="$RUNNER_TEMP/live-test-code-sha.txt"
          trap 'rm -f "$deployed_zip"' EXIT
          test_code_sha="$(aws lambda get-function-configuration \
            --function-name "$test_function_arn" \
            --query 'CodeSha256' \
            --output text \
            --no-cli-pager
          )"
          test -n "$test_code_sha"
          test "$test_code_sha" != "None"
          code_location="$(aws lambda get-function \
            --function-name "$test_function_arn" \
            --query 'Code.Location' \
            --output text \
            --no-cli-pager
          )"
          [[ "$code_location" == https://* ]]
          curl --fail --silent --show-error --location "$code_location" --output "$deployed_zip"
          unset code_location
          python3 - .aws-sam/build/ConfigAuthoringFunction "$deployed_zip" "$test_code_sha" <<'PY'
          # inline-lambda-zip-verifier:start
          import base64
          import hashlib
