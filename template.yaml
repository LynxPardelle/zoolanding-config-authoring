AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Config Authoring Lambda - SAM Template

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [dev, test, prod, production]
    Description: Deployment environment name used for tags and environment-specific stack configuration.
  ManageStorageResources:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Set to true for new non-production stacks that should create the config DynamoDB table and S3 bucket.
  ConfigTableName:
    Type: String
    Default: zoolanding-config-registry
    Description: DynamoDB table that stores site routing, lifecycle, and version metadata.
  ConfigPayloadsBucketName:
    Type: String
    Default: zoolanding-config-payloads
    Description: S3 bucket that stores versioned site payloads.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Log level for the Lambda.
  DeployAuthzConfigJson:
    Type: String
    Default: '[]'
    NoEcho: true
    Description: Small inline JSON or base64 JSON array mapping deploy IAM roles to allowed draft domains, environments, and actions.
  DeployAuthzConfigS3Key:
    Type: String
    Default: ''
    Description: Optional S3 key in ConfigPayloadsBucketName containing the deploy authorization JSON array.

Conditions:
  ShouldManageStorageResources:
    Fn::Equals:
      - Ref: ManageStorageResources
      - 'true'

Globals:
  Function:
    Runtime: python3.13
    Timeout: 20
    MemorySize: 256
    Tracing: PassThrough
    Tags:
      Project: Zoolandingpage
      Component: ConfigAuthoring
      ManagedBy: SAM
      Environment:
        Ref: EnvironmentName

Resources:
  ConfigRegistryTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldManageStorageResources
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Ref: ConfigTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: Zoolandingpage
        - Key: Component
          Value: ConfigRegistry
        - Key: ManagedBy
          Value: SAM
        - Key: Environment
          Value:
            Ref: EnvironmentName

  ConfigPayloadsBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldManageStorageResources
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName:
        Ref: ConfigPayloadsBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: Zoolandingpage
        - Key: Component
          Value: ConfigPayloads
        - Key: ManagedBy
          Value: SAM
        - Key: Environment
          Value:
            Ref: EnvironmentName

  AuthoringApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Tags:
        Project: Zoolandingpage
        Component: ConfigAuthoring
        ManagedBy: SAM
        Environment:
          Ref: EnvironmentName
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: AWS_IAM
        AddDefaultAuthorizerToCorsPreflight: false

  ConfigAuthoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Creates, reads, updates, publishes, and changes lifecycle state for site draft packages.
      FunctionUrlConfig:
        AuthType: AWS_IAM
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
      Environment:
        Variables:
          CONFIG_TABLE_NAME:
            Ref: ConfigTableName
          CONFIG_PAYLOADS_BUCKET_NAME:
            Ref: ConfigPayloadsBucketName
          ENVIRONMENT_NAME:
            Ref: EnvironmentName
          LOG_LEVEL:
            Ref: LogLevel
          DEPLOY_AUTHZ_CONFIG_JSON:
            Ref: DeployAuthzConfigJson
          DEPLOY_AUTHZ_CONFIG_S3_KEY:
            Ref: DeployAuthzConfigS3Key
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConfigTableName}
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}/*
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}
      Events:
        ConfigAuthoringPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: AuthoringApi
            Path: /config-authoring
            Method: POST
            Auth:
              Authorizer: AWS_IAM

Outputs:
  ApiUrl:
    Description: Config authoring endpoint URL.
    Value:
      Fn::Sub: https://${AuthoringApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/config-authoring
  FunctionName:
    Description: Deployed Lambda function name.
    Value:
      Ref: ConfigAuthoringFunction
  FunctionUrl:
    Description: IAM-protected Lambda Function URL for GitHub Actions deploys.
    Value:
      Fn::GetAtt: ConfigAuthoringFunctionUrl.FunctionUrl
