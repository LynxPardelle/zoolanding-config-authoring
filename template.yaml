AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Config Authoring Lambda - SAM Template

Parameters:
  ConfigTableName:
    Type: String
    Default: zoolanding-config-registry
    Description: DynamoDB table that stores site routing, lifecycle, and version metadata.
  ConfigPayloadsBucketName:
    Type: String
    Default: zoolanding-config-payloads
    Description: S3 bucket that stores versioned site payloads.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Log level for the Lambda.
  DeployAuthzConfigS3Key:
    Type: String
    Default: system/deploy-authz.json
    Description: Required private S3 key in ConfigPayloadsBucketName containing exact IAM role ARN authorization rules.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 20
    MemorySize: 256
    Tracing: PassThrough

Resources:
  AuthoringApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: AWS_IAM
        AddDefaultAuthorizerToCorsPreflight: false

  ConfigAuthoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Creates, reads, updates, publishes, and changes lifecycle state for site draft packages.
      FunctionUrlConfig:
        AuthType: AWS_IAM
        Cors:
          AllowOrigins:
            - '*'
          AllowHeaders:
            - Content-Type
            - Authorization
          AllowMethods:
            - POST
      Environment:
        Variables:
          CONFIG_TABLE_NAME:
            Ref: ConfigTableName
          CONFIG_PAYLOADS_BUCKET_NAME:
            Ref: ConfigPayloadsBucketName
          LOG_LEVEL:
            Ref: LogLevel
          DEPLOY_AUTHZ_CONFIG_S3_KEY:
            Ref: DeployAuthzConfigS3Key
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                Fn::Sub: arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ConfigTableName}
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}/sites/*
                - Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}/${DeployAuthzConfigS3Key}
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}/sites/*
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                Fn::Sub: arn:aws:s3:::${ConfigPayloadsBucketName}
              Condition:
                StringLike:
                  s3:prefix:
                    - sites/*
      Events:
        ConfigAuthoringPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: AuthoringApi
            Path: /config-authoring
            Method: POST
            Auth:
              Authorizer: AWS_IAM

Outputs:
  ApiUrl:
    Description: Config authoring endpoint URL.
    Value:
      Fn::Sub: https://${AuthoringApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/config-authoring
  FunctionName:
    Description: Deployed Lambda function name.
    Value:
      Ref: ConfigAuthoringFunction
  FunctionUrl:
    Description: IAM-protected Lambda Function URL for GitHub Actions deploys.
    Value:
      Fn::GetAtt: ConfigAuthoringFunctionUrl.FunctionUrl
